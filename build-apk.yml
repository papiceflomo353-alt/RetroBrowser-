name: 🤖 Build RetroWeb APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ─────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Cache Gradle dependencies ─────────────────────────────
      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Grant execute permission for gradlew ───────────────────
      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Build Debug APK ────────────────────────────────────────
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      # ── 6. Upload Debug APK as artifact ──────────────────────────
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RetroBrowser-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 7. Build Release APK (unsigned) ──────────────────────────
      - name: 🚀 Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── 8. Upload Release APK ─────────────────────────────────────
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: RetroBrowser-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 9. Print APK info ─────────────────────────────────────────
      - name: 📊 APK Info
        run: |
          echo "✅ Build complete!"
          echo "Debug APK:"
          ls -lh app/build/outputs/apk/debug/*.apk || echo "Not found"
          echo "Release APK:"
          ls -lh app/build/outputs/apk/release/*.apk || echo "Not found"
